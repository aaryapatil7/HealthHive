<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Your Fitness Journey</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: #0f0f0f;
        color: white;
    }

    /* HERO SECTION */
    .hero {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        background: linear-gradient(135deg, #000, #111);
    }

    .hero h1 {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    .hero span {
        color: #00ff88;
    }

    .hero p {
        color: #aaa;
        margin-bottom: 30px;
    }

    .start-btn {
        padding: 12px 30px;
        background: #00ff88;
        border: none;
        color: black;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 25px;
        transition: 0.3s;
    }

    .start-btn:hover {
        background: #00cc6a;
        transform: scale(1.05);
    }

    /* FORM SECTION */
    .container {
        display: none;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #111;
        padding: 40px;
        border-radius: 15px;
        width: 300px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }

    .card h2 {
        margin-bottom: 20px;
        color: #00ff88;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        outline: none;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #00ff88;
        border: none;
        color: black;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
        margin-top: 10px;
    }

    .btn:hover {
        background: #00cc6a;
    }

    #result {
        margin-top: 15px;
        font-size: 1.1rem;
    }
</style>

</head>
<body>

<!-- HERO SECTION -->
<div class="hero" id="hero">
    <h1>Start Your <span>Fitness Journey</span></h1>
    <p>Transform your body. Build confidence. Become unstoppable.</p>
    <button class="start-btn" onclick="showForm()">Get Started</button>
</div>

<!-- BMI FORM -->
<div class="container" id="formSection">
    <div class="card">
        <h2>Check Your BMI</h2>

        <input type="number" id="height" placeholder="Height (meters)" step="0.01">
        <input type="number" id="weight" placeholder="Weight (kg)">

        <button class="btn" onclick="calculateBMI()">Calculate</button>

        <p id="result"></p>
    </div>
</div>

<script>
    function showForm() {
        document.getElementById("hero").style.display = "none";
        document.getElementById("formSection").style.display = "flex";
    }

    function calculateBMI() {
        let height = parseFloat(document.getElementById("height").value);
        let weight = parseFloat(document.getElementById("weight").value);

        if (!height || !weight || height <= 0 || weight <= 0) {
            alert("Enter valid values!");
            return;
        }

        let bmi = weight / (height * height);
        bmi = bmi.toFixed(2);

        document.getElementById("result").innerText = "BMI: " + bmi;

        // Redirect logic
        setTimeout(() => {
            if (bmi < 18.5) {
                window.location.href = "weight-gain.html";
            } 
            else if (bmi >= 18.5 && bmi <= 25) {
                alert("Perfect! Maintain your body & build muscles 💪");
                window.location.href = "Asthetic.html";

            } 
            else {
                window.location.href = "weight-loss.html";
            }
        }, 1500);
    }
</script>

</body>
</html>
